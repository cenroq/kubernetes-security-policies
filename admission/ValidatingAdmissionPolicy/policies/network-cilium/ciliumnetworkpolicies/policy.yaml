apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: ciliumnetworkpolicy-egress-world
  annotations:
    security.kubeapt.io/displayName: "Cilium NetworkPolicy World Entity"
    security.kubeapt.io/description: "CiliumNetworkPolicies must not allow ingress from or egress to the 'world' entity."
    security.kubeapt.io/resource: "CiliumNetworkPolicies"
    security.kubeapt.io/severity: "High"
    security.kubeapt.io/remediation: "Remove the 'world' entity from toEntities/fromEntities and scope rules to specific CIDRs or selectors. Fields: spec.egress[*].toEntities, spec.ingress[*].fromEntities."
    security.kubeapt.io/product: "Cilium"
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups:
      - cilium.io
      apiVersions:
      - v2
      operations:
      - CREATE
      - UPDATE
      resources:
      - ciliumnetworkpolicies
  validations:
  - expression: |
      !has(object.spec) || (
        !object.spec.?egress.orValue([]).exists(e, e.?toEntities.orValue([]).exists(x, x == 'world')) &&
        !object.spec.?ingress.orValue([]).exists(i, i.?fromEntities.orValue([]).exists(x, x == 'world'))
      )
    message: |
      CiliumNetworkPolicies must not allow ingress from or egress to the 'world' entity.
