apiVersion: v1
kind: Pod
metadata:
  name: violating-image-digest-initcontainers
spec:
  initContainers:
  - name: init
    image: busybox:1.36
    command: ["sh", "-c", "echo init"]
  containers:
  - name: main
    image: busybox@sha256:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    command: ["sh", "-c", "sleep 3600"]
